<!DOCTYPE html>
<html lang="es" xmlns:mso="urn:schemas-microsoft-com:office:office" xmlns:msdt="uuid:C2F41010-65B3-11d1-A29F-00AA00C14882">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malla Soberana - Dashboard de Ejecución</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
    :root { --primary: #1a2a3a; --accent: #C8A45C; --bg-dark: #0f172a; }
    
    .grid-row-label { 
        height: 40px; display: flex; align-items: center; justify-content: flex-end; 
        line-height: 1.2; padding-top: 4px; padding-bottom: 4px; border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .grid-row-dot { height: 40px; display: flex; align-items: center; justify-content: center; border-bottom: 1px solid rgba(255,255,255,0.05); }

    .upset-matrix-circle { width: 14px; height: 14px; border-radius: 50%; border: 2px solid #475569; background: #1B2A4A; position: relative; z-index: 10; margin: 0 auto;}
    .upset-matrix-circle.active { background-color: var(--accent); border-color: var(--accent); box-shadow: 0 0 10px rgba(200, 164, 92, 0.6); }
    .upset-line { width: 2px; background-color: var(--accent); position: absolute; left: 50%; transform: translateX(-50%); z-index: 1; }

    .bar-container { height: 140px; }
    .bar { width: 40px; background-color: #334155; position: relative; transition: all 0.3s; cursor: pointer; border-radius: 4px 4px 0 0; }
    .bar-fill { width: 100%; position: absolute; bottom: 0; background-color: var(--accent); transition: height 1s ease-out; border-radius: 4px 4px 0 0; }
    
    .milestone-id-label { font-size: 10px; color: #94a3b8; font-weight: bold; margin-top: 8px; }
    .custom-scrollbar::-webkit-scrollbar { height: 8px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
    </style>

<!--[if gte mso 9]><xml>
<mso:CustomDocumentProperties>
<mso:_ApprovalStatus msdt:dt="string">0</mso:_ApprovalStatus>
<mso:_ApprovalAssignedTo msdt:dt="string"></mso:_ApprovalAssignedTo>
<mso:_ApprovalRespondedBy msdt:dt="string"></mso:_ApprovalRespondedBy>
<mso:_ApprovalSentBy msdt:dt="string"></mso:_ApprovalSentBy>
</mso:CustomDocumentProperties>
</xml><![endif]-->
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen p-8 font-sans overflow-x-hidden selection:bg-amber-500/30">
    <div class="max-w-7xl mx-auto bg-slate-900 border border-slate-800 rounded-2xl shadow-2xl p-10">
        
        <header class="mb-8 border-b border-slate-800 pb-6 flex justify-between items-end">
            <div>
                <h1 class="text-3xl font-bold tracking-tight text-white uppercase">Malla Soberana Muisca</h1>
                <p class="text-slate-400 mt-2 tracking-wider text-sm uppercase font-mono">Control de Avance Contractual y EDT</p>
            </div>
            <div class="text-right">
                <span class="px-3 py-1 bg-slate-800 text-amber-500 text-xs rounded-full border border-amber-500/30 font-bold uppercase">Jerarquía de Niveles Activa</span>
            </div>
        </header>

        <div class="flex">
            <div id="expected-labels" class="w-1/3 pt-[193px] pr-6 text-right flex flex-col"></div>

            <div class="w-2/3 overflow-x-auto custom-scrollbar pb-4">
                <div class="w-full text-center mb-4">
                    <h2 id="hitos-header" class="text-amber-500 font-bold tracking-[0.3em] uppercase text-sm">Hitos</h2>
                </div>
                <div id="bars-container" class="bar-container flex gap-12 border-b border-slate-700 pb-2 relative"></div>
                <div id="matrix-container" class="relative flex gap-12 pt-2"></div>
            </div>
        </div>

        <div id="ficha-tecnica" class="mt-8 bg-slate-800/40 p-6 rounded-xl border border-amber-700 transition-all duration-500 opacity-40">
            <div class="flex justify-between items-start mb-4 border-b border-amber-900/30 pb-4">
                <div>
                    <span id="ficha-id" class="text-xs font-bold bg-amber-900/50 text-amber-400 px-2 py-1 rounded tracking-widest mb-2 inline-block uppercase">Hito</span>
                    <h3 id="ficha-title" class="text-2xl font-bold text-white tracking-wide">Seleccione una barra de progreso</h3>
                </div>
                <div class="text-right">
                    <p id="ficha-date" class="text-sm text-slate-400 font-mono"></p>
                    <p id="ficha-resp" class="text-sm font-bold text-slate-300 mt-1 uppercase"></p>
                </div>
            </div>
            <div id="ficha-details" class="text-slate-300 leading-relaxed text-lg font-light"></div>
        </div>
    </div>

    <script src="registry.js"></script>
    <script src="app.js"></script>
</body>
</html>
